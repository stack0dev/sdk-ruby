AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Metrics/MethodLength:
  Max: 30

Metrics/AbcSize:
  Max: 40

Metrics/ClassLength:
  Max: 500

Metrics/ParameterLists:
  Max: 15
  CountKeywordArgs: false

Layout/LineLength:
  Max: 120
